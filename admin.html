<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Desert Lead Bots</title>
<style>
:root{
--navy:#0f2740; --blue:#1c6dd0; --blue-dark:#154f97; --amber:#f5a623; --green:#1c9c63; --red:#c0392b;
--bg:#f7f9fc; --text:#1c2733; --muted:#5b6b7b; --white:#ffffff; --border:#e3e9f0;
--radius:14px; --shadow:0 10px 34px rgba(15,39,64,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--text);background:var(--bg);line-height:1.5}
a{color:inherit}
header{background:var(--navy);color:#fff;padding:16px 28px;display:flex;align-items:center;justify-content:space-between}
.brand{font-weight:800;font-size:17px}
.brand span{color:var(--amber)}
header .right{display:flex;align-items:center;gap:16px;font-size:13.5px}
.btn{display:inline-block;text-decoration:none;font-weight:700;padding:9px 16px;border-radius:9px;font-size:13.5px;border:none;cursor:pointer;font-family:inherit}
.btn-primary{background:var(--blue);color:#fff}
.btn-ghost-dark{background:rgba(255,255,255,.12);color:#fff}
.btn-small{padding:6px 11px;font-size:12px;border-radius:7px}
.btn-amber{background:var(--amber);color:var(--navy)}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--navy)}

#gate{max-width:420px;margin:90px auto;background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:34px;box-shadow:var(--shadow)}
#gate h1{font-size:22px;color:var(--navy);margin-bottom:6px}
#gate p{color:var(--muted);font-size:14px;margin-bottom:22px}
#gate form{display:flex;flex-direction:column;gap:12px}
#gate label{font-size:13px;font-weight:700;color:var(--navy)}
#gate input{padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit}
.msg{font-size:13.5px;padding:9px 11px;border-radius:8px;margin-top:2px}
.msg.error{background:#fdecec;color:#a8321f}
.msg.ok{background:#e9f8ef;color:#146c43}

#dash{display:none}
.stats{display:flex;gap:16px;padding:22px 28px 0}
.stat{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px 20px;flex:1;box-shadow:var(--shadow)}
.stat .n{font-size:24px;font-weight:800;color:var(--navy)}
.stat .l{font-size:12.5px;color:var(--muted);font-weight:600}

.layout{display:grid;grid-template-columns:1.5fr 1fr;gap:20px;padding:20px 28px 40px;align-items:start}
.panel{background:#fff;border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.panel h2{font-size:15px;color:var(--navy);padding:16px 18px;border-bottom:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;padding:10px 14px;background:var(--bg)}
td{padding:11px 14px;border-top:1px solid var(--border);vertical-align:middle}
tr.selected td{background:#eaf1fb}
.name{font-weight:700;color:var(--navy)}
.sub{color:var(--muted);font-size:12px}
.badge{font-size:10.5px;font-weight:800;text-transform:uppercase;padding:3px 8px;border-radius:999px;letter-spacing:.03em}
.badge.customer{background:#eaf1fb;color:var(--blue-dark)}
.badge.staff{background:#fdf3e0;color:#a06a00}
.badge.admin{background:#fde9e9;color:var(--red)}
.row-actions{display:flex;gap:6px;flex-wrap:wrap}

#chatPanel .chat-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.chat-log{height:420px;overflow-y:auto;padding:16px;background:var(--bg);display:flex;flex-direction:column;gap:10px}
.bubble{max-width:78%;padding:9px 13px;border-radius:12px;font-size:13.5px}
.bubble.mine{align-self:flex-end;background:var(--blue);color:#fff;border-bottom-right-radius:3px}
.bubble.theirs{align-self:flex-start;background:#fff;border:1px solid var(--border);border-bottom-left-radius:3px}
.bubble .who{font-size:10px;opacity:.75;margin-bottom:2px;font-weight:700;text-transform:uppercase}
.chat-input{display:flex;gap:8px;padding:12px;border-top:1px solid var(--border);background:#fff}
.chat-input input{flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13.5px;font-family:inherit}
.empty{color:var(--muted);font-size:13.5px;text-align:center;padding:60px 0}
</style>
</head>
<body>

<header>
<div class="brand">Desert Lead Bots <span>Admin</span></div>
<div class="right" id="headerRight" style="display:none">
  <span id="whoAmI"></span>
  <button class="btn btn-ghost-dark" id="signOutBtn">Sign out</button>
</div>
</header>

<!-- Login gate -->
<div id="gate">
  <h1>Admin sign in</h1>
  <p>Sign in with your staff/admin account.</p>
  <form id="gateForm">
    <div>
      <label>Email</label>
      <input type="email" id="gateEmail" required>
    </div>
    <div>
      <label>Password</label>
      <input type="password" id="gatePassword" required>
    </div>
    <button class="btn btn-primary" type="submit">Sign In</button>
    <div id="gateMsg"></div>
  </form>
</div>

<!-- Dashboard -->
<div id="dash">
  <div class="stats">
    <div class="stat"><div class="n" id="statUsers">–</div><div class="l">Registered accounts</div></div>
    <div class="stat"><div class="n" id="statVisits">–</div><div class="l">Visits (last 200 logged)</div></div>
    <div class="stat"><div class="n" id="statSpend">–</div><div class="l">Total spend tracked</div></div>
  </div>

  <div class="layout">
    <div class="panel">
      <h2>Accounts</h2>
      <table>
        <thead><tr><th>Name / Email</th><th>Role</th><th>Location</th><th>Spent</th><th>Last seen</th><th></th></tr></thead>
        <tbody id="userRows"><tr><td colspan="6" class="empty">Loading…</td></tr></tbody>
      </table>
    </div>

    <div class="panel" id="chatPanel">
      <div class="chat-head">
        <strong id="chatWithName">Select a person to chat</strong>
      </div>
      <div class="chat-log" id="chatLog"><div class="empty">Pick someone from the list on the left.</div></div>
      <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Type a reply…" disabled>
        <button class="btn btn-primary" id="chatSendBtn" disabled>Send</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="supabase-client.js"></script>
<script>
let me = null;
let allProfiles = [];
let selectedCustomerId = null;
let chatChannel = null;

document.getElementById("gateForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("gateEmail").value;
  const password = document.getElementById("gatePassword").value;
  const msgEl = document.getElementById("gateMsg");
  msgEl.innerHTML = "";
  const { error } = await dlbSignIn(email, password);
  if (error) {
    msgEl.innerHTML = `<div class="msg error">${error.message}</div>`;
    return;
  }
  await checkAccess();
});

document.getElementById("signOutBtn").addEventListener("click", async () => {
  await dlbSignOut();
  window.location.reload();
});

async function checkAccess() {
  const profile = await dlbGetMyProfile();
  if (!profile || (profile.role !== "admin" && profile.role !== "staff")) {
    document.getElementById("gateMsg").innerHTML =
      `<div class="msg error">That account doesn't have staff/admin access.</div>`;
    return;
  }
  me = profile;
  document.getElementById("gate").style.display = "none";
  document.getElementById("dash").style.display = "block";
  document.getElementById("headerRight").style.display = "flex";
  document.getElementById("whoAmI").textContent = me.full_name || me.email;
  await loadDashboard();
}

async function loadDashboard() {
  allProfiles = await dlbGetAllProfiles();
  const visits = await dlbGetVisits(200);

  document.getElementById("statUsers").textContent = allProfiles.length;
  document.getElementById("statVisits").textContent = visits.length;
  const totalSpent = allProfiles.reduce((sum, p) => sum + (p.total_spent_cents || 0), 0);
  document.getElementById("statSpend").textContent = "$" + (totalSpent / 100).toFixed(2);

  renderUserRows();

  if (!chatChannel) {
    chatChannel = dlbSubscribeToAllMessages((m) => {
      if (m.customer_id === selectedCustomerId) renderChatMessage(m);
    });
  }
}

function locationLabel(p) {
  const parts = [p.city, p.region, p.country].filter(Boolean);
  return parts.length ? parts.join(", ") : "Unknown";
}

function renderUserRows() {
  const tbody = document.getElementById("userRows");
  if (!allProfiles.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty">No accounts yet.</td></tr>`;
    return;
  }
  tbody.innerHTML = "";
  allProfiles.forEach((p) => {
    const tr = document.createElement("tr");
    if (p.id === selectedCustomerId) tr.classList.add("selected");
    const isAdmin = p.role === "admin";
    tr.innerHTML = `
      <td><div class="name">${p.full_name || "(no name)"}</div><div class="sub">${p.email}</div></td>
      <td><span class="badge ${p.role}">${p.role}</span></td>
      <td>${locationLabel(p)}</td>
      <td>$${((p.total_spent_cents || 0) / 100).toFixed(2)}</td>
      <td class="sub">${p.last_seen_at ? new Date(p.last_seen_at).toLocaleString() : "–"}</td>
      <td>
        <div class="row-actions">
          <button class="btn btn-outline btn-small" data-chat="${p.id}">Chat</button>
          <button class="btn ${isAdmin ? "btn-outline" : "btn-amber"} btn-small" data-role="${p.id}" data-newrole="${isAdmin ? "customer" : "admin"}">
            ${isAdmin ? "Remove admin" : "Make admin"}
          </button>
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });

  tbody.querySelectorAll("[data-chat]").forEach((btn) => {
    btn.addEventListener("click", () => openChat(btn.dataset.chat));
  });
  tbody.querySelectorAll("[data-role]").forEach((btn) => {
    btn.addEventListener("click", async () => {
      const ok = confirm(`Change this account's role to "${btn.dataset.newrole}"?`);
      if (!ok) return;
      await dlbSetRole(btn.dataset.role, btn.dataset.newrole);
      await loadDashboard();
    });
  });
}

async function openChat(customerId) {
  selectedCustomerId = customerId;
  const customer = allProfiles.find((p) => p.id === customerId);
  document.getElementById("chatWithName").textContent =
    "Chat with " + (customer.full_name || customer.email);
  document.getElementById("chatInput").disabled = false;
  document.getElementById("chatSendBtn").disabled = false;
  renderUserRows();

  const log = document.getElementById("chatLog");
  log.innerHTML = `<div class="empty">Loading messages…</div>`;
  const msgs = await dlbGetMessages(customerId);
  log.innerHTML = "";
  if (!msgs.length) {
    log.innerHTML = `<div class="empty">No messages yet.</div>`;
  } else {
    msgs.forEach(renderChatMessage);
  }
}

function renderChatMessage(m) {
  if (m.customer_id !== selectedCustomerId) return;
  const log = document.getElementById("chatLog");
  const emptyEl = log.querySelector(".empty");
  if (emptyEl) emptyEl.remove();
  const mine = m.sender_id === me.id;
  const div = document.createElement("div");
  div.className = "bubble " + (mine ? "mine" : "theirs");
  div.innerHTML = `<div class="who">${mine ? "You" : "Customer"}</div>${m.body.replace(/</g, "&lt;")}`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

document.getElementById("chatSendBtn").addEventListener("click", sendReply);
document.getElementById("chatInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendReply();
});

async function sendReply() {
  if (!selectedCustomerId) return;
  const input = document.getElementById("chatInput");
  const body = input.value.trim();
  if (!body) return;
  input.value = "";
  await dlbSendMessage(selectedCustomerId, me.id, body);
}

// ---- Init ----
(async () => {
  const session = await dlbGetSession();
  if (session) await checkAccess();
})();
</script>
</body>
</html>
